<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepMemBot – Chatbot Presque Aussi Fort que DeepSeek</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            background: #f0f2f5;
            padding: 0 1rem;
        }
        h1 { text-align: center; color: #1a1a2e; margin-bottom: 0.2rem; }
        .subtitle { text-align: center; color: #555; margin-top: 0; font-style: italic; }
        #chatbox {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 1.2rem;
            height: 450px;
            overflow-y: auto;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .message {
            max-width: 85%;
            padding: 0.7rem 1.2rem;
            border-radius: 20px;
            line-height: 1.45;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #007aff, #0051d5);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .bot {
            align-self: flex-start;
            background: #e9e9ef;
            color: #1c1c1e;
            border-bottom-left-radius: 6px;
        }
        #input-area {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        #userInput {
            flex: 1;
            padding: 0.7rem 1.2rem;
            border: 1.5px solid #d0d0d0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        #userInput:focus { border-color: #007aff; }
        button {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.7rem 1.8rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #005bb5; }
        button:active { transform: scale(0.96); }
        .info { text-align: center; color: #777; font-size: 0.85rem; margin-top: 0.4rem; }
        .small-btn {
            background: #e0e0e0;
            color: #333;
            padding: 0.4rem 0.9rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>🧠 DeepMemBot</h1>
    <p class="subtitle">Bilingue FR/EN · Mémoire · Raisonnement · Météo · Blagues</p>
    <div id="chatbox"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Parlez-moi..." autofocus>
        <button onclick="processInput()">➤</button>
        <button class="small-btn" onclick="document.getElementById('userInput').value='aide'; processInput();">❓</button>
        <button class="small-btn" onclick="memory.exportFacts();">📤</button>
    </div>
    <div class="info">Dites « météo à Paris », « 2+2 », « raconte une blague », « mon nom est… »</div>

    <script>
    // ================== 1. Utilitaires ==================
    const levenshteinRatio = (s1, s2) => {
        s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
        if (!s1 && !s2) return 1.0;
        if (!s1 || !s2) return 0.0;
        const len1 = s1.length, len2 = s2.length;
        const dp = Array.from({ length: len1 + 1 }, () => Array(len2 + 1).fill(0));
        for (let i = 0; i <= len1; i++) dp[i][0] = i;
        for (let j = 0; j <= len2; j++) dp[0][j] = j;
        for (let i = 1; i <= len1; i++) {
            for (let j = 1; j <= len2; j++) {
                dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + (s1[i - 1] === s2[j - 1] ? 0 : 1));
            }
        }
        return 1.0 - dp[len1][len2] / Math.max(len1, len2);
    };

    // ================== 2. Base de connaissances (petite) ==================
    const ONTOLOGY = {
        food: ["pizza", "pâtes", "sushi", "burger", "salade", "chocolat", "frites", "fromage", "pain", "riz"],
        drink: ["eau", "café", "thé", "jus", "soda", "bière", "vin"],
        animal: ["chien", "chat", "lapin", "cheval", "oiseau", "poisson", "tortue"],
        sport: ["football", "tennis", "basket", "natation", "course", "cyclisme"],
        city: ["paris", "londres", "new york", "tokyo", "berlin", "madrid", "rome", "montréal"],
        country: ["france", "angleterre", "usa", "japon", "allemagne", "italie", "canada"],
        color: ["rouge", "bleu", "vert", "jaune", "noir", "blanc", "orange", "violet", "rose"]
    };
    const getCategory = (word) => {
        for (const [cat, items] of Object.entries(ONTOLOGY)) {
            if (items.includes(word)) return cat;
        }
        return null;
    };

    // ================== 3. Canonisation des prédicats ==================
    const SURFACE_TO_CANON = {
        "name":"name","nom":"name","prénom":"name","first name":"name",
        "age":"age","âge":"age","anniversaire":"birthday","birthday":"birthday",
        "couleur préférée":"favorite_color","favorite color":"favorite_color","fav color":"favorite_color",
        "plat préféré":"favorite_food","nourriture préférée":"favorite_food","favorite food":"favorite_food","fav food":"favorite_food",
        "boisson préférée":"favorite_drink","favorite drink":"favorite_drink",
        "animal préféré":"favorite_animal","favorite animal":"favorite_animal",
        "film préféré":"favorite_movie","favorite movie":"favorite_movie",
        "livre préféré":"favorite_book","favorite book":"favorite_book",
        "chanson préférée":"favorite_song","favorite song":"favorite_song",
        "humeur":"mood","mood":"mood","état":"state","state":"state",
        "travail":"job","job":"job","métier":"job",
        "pays":"country","country":"country","ville":"city","city":"city",
        "langue":"language","language":"language",
        "couleur":"color","color":"color",
        "équipe préférée":"favorite_team","favorite team":"favorite_team",
    };
    const REVERSE_CANON = {};
    for (const [k, v] of Object.entries(SURFACE_TO_CANON)) REVERSE_CANON[k] = v;

    const UNIQUE_PREDICATES = new Set(Object.values(SURFACE_TO_CANON));

    const VERB_CANON = {
        "am":"is","are":"is","is":"is","like":"like","love":"like","enjoy":"like","adore":"like",
        "have":"has","has":"has","got":"has",
        "suis":"is","es":"is","est":"is","êtes":"is","sont":"is",
        "aime":"like","adore":"like","kiffe":"like",
        "ai":"has","as":"has","a":"has","avons":"has","avez":"has","ont":"has",
        "veux":"want","voulez":"want","veut":"want","want":"want","wants":"want",
        "préfère":"prefer","prefer":"prefer","prefers":"prefer",
    };

    function canonicalizePredicate(surface, threshold=0.75) {
        surface = surface.trim().toLowerCase();
        if (REVERSE_CANON[surface]) return REVERSE_CANON[surface];
        let best = null, bestRatio = 0;
        for (const [key, val] of Object.entries(REVERSE_CANON)) {
            const r = levenshteinRatio(surface, key);
            if (r > bestRatio) { bestRatio = r; best = val; }
        }
        return bestRatio >= threshold ? best : surface.replace(/ /g, "_");
    }
    const canonicalizeVerb = v => VERB_CANON[v.trim().toLowerCase()] || v.trim().toLowerCase();

    // ================== 4. Moteur de mémoire avancé ==================
    class MemoryEngine {
        constructor() {
            this.facts = this.load();
        }
        load() {
            try {
                const d = localStorage.getItem('deepmem_facts');
                return d ? JSON.parse(d).map(f => ({...f, timestamp: new Date(f.timestamp)})) : [];
            } catch(e) { return []; }
        }
        save() { localStorage.setItem('deepmem_facts', JSON.stringify(this.facts)); }
        addFact(subj, pred, obj, polarity=true, lang="en") {
            obj = obj.trim().toLowerCase();
            pred = pred.trim().toLowerCase();
            if (UNIQUE_PREDICATES.has(pred)) {
                this.facts = this.facts.filter(f => !(f.subj===subj && f.pred===pred));
            } else {
                const existing = this.facts.find(f => f.subj===subj && f.pred===pred && f.obj===obj);
                if (existing) {
                    existing.polarity = polarity;
                    existing.timestamp = new Date();
                    this.save();
                    this.applyInference(subj, pred, obj, polarity);
                    return;
                }
            }
            this.facts.push({ subj, pred, obj, polarity, lang, timestamp: new Date() });
            this.save();
            this.applyInference(subj, pred, obj, polarity);
        }
        applyInference(subj, pred, obj, polarity) {
            // Héritage simple : si like X et X est une food, alors like food (si pas déjà)
            if (pred === "like" && polarity && subj === "user") {
                const cat = getCategory(obj);
                if (cat) {
                    const parentPred = "favorite_" + cat; // ex: favorite_food
                    if (!this.queryFacts(subj, parentPred).length) {
                        this.addFact(subj, parentPred, obj, true, "auto");
                    }
                }
            }
        }
        queryFacts(subj, pred, obj=null, fuzzyObj=false, thresh=0.8) {
            return this.facts.filter(f => {
                if (f.subj !== subj) return false;
                if (f.pred !== pred) return false;
                if (obj !== null) {
                    if (fuzzyObj) return levenshteinRatio(obj.toLowerCase(), f.obj) >= thresh;
                    else return f.obj === obj.toLowerCase();
                }
                return true;
            });
        }
        getAllSubjFacts(subj) { return this.facts.filter(f => f.subj===subj); }
        forgetFacts(subj, pred=null, obj=null, fuzzyObj=false, thresh=0.8) {
            this.facts = this.facts.filter(f => {
                if (f.subj !== subj) return true;
                if (pred !== null && f.pred !== pred) return true;
                if (obj !== null) {
                    if (fuzzyObj) return levenshteinRatio(obj.toLowerCase(), f.obj) < thresh;
                    else return f.obj !== obj.toLowerCase();
                }
                return false;
            });
            this.save();
        }
        forgetAllSubj(subj) { this.facts = this.facts.filter(f => f.subj!==subj); this.save(); }
        exportFacts() {
            const data = JSON.stringify(this.facts, null, 2);
            const blob = new Blob([data], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'deepmem_facts.json';
            a.click();
            addMessage("📂 Faits exportés.", 'bot');
        }
    }

    // ================== 5. Patterns d'extraction améliorés ==================
    const patterns = [];
    const addPat = (regex, subj, verbOrPred, objGroup, polarity, lang) => {
        patterns.push({ regex: new RegExp(regex, 'i'), subj, verbOrPred, objGroup, polarity, lang });
    };
    // Français
    const fr = [
        ["^je suis (.+)$", "user","is","obj",true,"fr"],
        ["^je ne suis pas (.+)$", "user","is","obj",false,"fr"],
        ["^j'suis (.+)$", "user","is","obj",true,"fr"],
        ["^j'suis pas (.+)$", "user","is","obj",false,"fr"],
        ["^tu es (.+)$", "bot","is","obj",true,"fr"],
        ["^tu n'es pas (.+)$", "bot","is","obj",false,"fr"],
        ["^t'es (.+)$", "bot","is","obj",true,"fr"],
        ["^t'es pas (.+)$", "bot","is","obj",false,"fr"],
        ["^j'aime (.+)$", "user","like","obj",true,"fr"],
        ["^je n'aime pas (.+)$", "user","like","obj",false,"fr"],
        ["^j'adore (.+)$", "user","like","obj",true,"fr"],
        ["^je n'adore pas (.+)$", "user","like","obj",false,"fr"],
        ["^tu aimes (.+)$", "bot","like","obj",true,"fr"],
        ["^tu n'aimes pas (.+)$", "bot","like","obj",false,"fr"],
        ["^j'ai (.+)$", "user","has","obj",true,"fr"],
        ["^je n'ai pas (.+)$", "user","has","obj",false,"fr"],
        ["^tu as (.+)$", "bot","has","obj",true,"fr"],
        ["^tu n'as pas (.+)$", "bot","has","obj",false,"fr"],
        ["^mon (.+?) est (.+)$", "user","poss","obj",true,"fr"],
        ["^ma (.+?) est (.+)$", "user","poss","obj",true,"fr"],
        ["^mes (.+?) sont (.+)$", "user","poss","obj",true,"fr"],
        ["^ton (.+?) est (.+)$", "bot","poss","obj",true,"fr"],
        ["^ta (.+?) est (.+)$", "bot","poss","obj",true,"fr"],
        ["^tes (.+?) sont (.+)$", "bot","poss","obj",true,"fr"],
        ["^je veux (.+)$", "user","want","obj",true,"fr"],
        ["^je ne veux pas (.+)$", "user","want","obj",false,"fr"],
        ["^je préfère (.+)$", "user","prefer","obj",true,"fr"],
        ["^je me sens (.+)$", "user","mood","obj",true,"fr"],
        ["^je suis de (.+)$", "user","city","obj",true,"fr"],
        ["^je viens de (.+)$", "user","country","obj",true,"fr"],
    ];
    fr.forEach(p => addPat(...p));
    // Anglais
    const en = [
        ["^i am (.+)$", "user","is","obj",true,"en"],
        ["^i'm (.+)$", "user","is","obj",true,"en"],
        ["^i am not (.+)$", "user","is","obj",false,"en"],
        ["^i'm not (.+)$", "user","is","obj",false,"en"],
        ["^you are (.+)$", "bot","is","obj",true,"en"],
        ["^you're (.+)$", "bot","is","obj",true,"en"],
        ["^you are not (.+)$", "bot","is","obj",false,"en"],
        ["^you aren't (.+)$", "bot","is","obj",false,"en"],
        ["^i (?:like|love|enjoy|adore) (.+)$", "user","like","obj",true,"en"],
        ["^i (?:don't|do not) (?:like|love|enjoy|adore) (.+)$", "user","like","obj",false,"en"],
        ["^you (?:like|love|enjoy|adore) (.+)$", "bot","like","obj",true,"en"],
        ["^you (?:don't|do not) (?:like|love|enjoy|adore) (.+)$", "bot","like","obj",false,"en"],
        ["^i have (.+)$", "user","has","obj",true,"en"],
        ["^i don't have (.+)$", "user","has","obj",false,"en"],
        ["^you have (.+)$", "bot","has","obj",true,"en"],
        ["^you don't have (.+)$", "bot","has","obj",false,"en"],
        ["^my (.+?) is (.+)$", "user","poss","obj",true,"en"],
        ["^your (.+?) is (.+)$", "bot","poss","obj",true,"en"],
        ["^i want (.+)$", "user","want","obj",true,"en"],
        ["^i don't want (.+)$", "user","want","obj",false,"en"],
        ["^i prefer (.+)$", "user","prefer","obj",true,"en"],
        ["^i feel (.+)$", "user","mood","obj",true,"en"],
        ["^i am from (.+)$", "user","country","obj",true,"en"],
        ["^i'm from (.+)$", "user","country","obj",true,"en"],
    ];
    en.forEach(p => addPat(...p));

    function extractFact(text) {
        text = text.trim();
        for (const {regex, subj, verbOrPred, objGroup, polarity, lang} of patterns) {
            const m = text.match(regex);
            if (!m) continue;
            if (verbOrPred === "poss") {
                const rawPoss = m[1].trim();
                const obj = m[2].trim().replace(/[.?!;:,]$/, '');
                let pred = canonicalizePredicate(rawPoss);
                if (!pred) pred = rawPoss.replace(/ /g, "_");
                return { subj, pred, obj, polarity, lang };
            } else {
                const obj = m[1].trim().replace(/[.?!;:,]$/, '');
                const pred = canonicalizeVerb(verbOrPred);
                return { subj, pred, obj, polarity, lang };
            }
        }
        return null;
    }

    // ================== 6. Questions ==================
    const qPatterns = [];
    const addQ = (regex, qtype, subj, predGroup, objGroup, lang) => {
        qPatterns.push({ regex: new RegExp(regex, 'i'), qtype, subj, predGroup, objGroup, lang });
    };
    // Français
    [
        ["^(?:quel(?:le)? est|qu'est-ce que|c'est quoi) mon (.+?) ?\\??$", "get","user","pred",null,"fr"],
        ["^(?:quel(?:le)? est|qu'est-ce que|c'est quoi) ton (.+?) ?\\??$", "get","bot","pred",null,"fr"],
        ["^suis-je (.+?) ?\\??$", "check","user","is","obj","fr"],
        ["^es-tu (.+?) ?\\??$", "check","bot","is","obj","fr"],
        ["^est-ce que j'aime (.+?) ?\\??$", "check","user","like","obj","fr"],
        ["^aimes-tu (.+?) ?\\??$", "check","bot","like","obj","fr"],
        ["^est-ce que j'ai (.+?) ?\\??$", "check","user","has","obj","fr"],
        ["^as-tu (.+?) ?\\??$", "check","bot","has","obj","fr"],
        ["^qu'est-ce que j'aime ?\\??$", "get","user","like",null,"fr"],
        ["^qu'est-ce que tu aimes ?\\??$", "get","bot","like",null,"fr"],
        ["^comment je me sens ?\\??$", "get","user","mood",null,"fr"],
        ["^d'où je viens ?\\??$", "get","user","country",null,"fr"],
    ].forEach(p => addQ(...p));
    // Anglais
    [
        ["^what is my (.+?) ?\\??$", "get","user","pred",null,"en"],
        ["^what's my (.+?) ?\\??$", "get","user","pred",null,"en"],
        ["^what is your (.+?) ?\\??$", "get","bot","pred",null,"en"],
        ["^what's your (.+?) ?\\??$", "get","bot","pred",null,"en"],
        ["^am i (.+?) ?\\??$", "check","user","is","obj","en"],
        ["^are you (.+?) ?\\??$", "check","bot","is","obj","en"],
        ["^do i like (.+?) ?\\??$", "check","user","like","obj","en"],
        ["^do you like (.+?) ?\\??$", "check","bot","like","obj","en"],
        ["^do i have (.+?) ?\\??$", "check","user","has","obj","en"],
        ["^do you have (.+?) ?\\??$", "check","bot","has","obj","en"],
        ["^what do i like ?\\??$", "get","user","like",null,"en"],
        ["^what do you like ?\\??$", "get","bot","like",null,"en"],
        ["^how do i feel ?\\??$", "get","user","mood",null,"en"],
        ["^where am i from ?\\??$", "get","user","country",null,"en"],
    ].forEach(p => addQ(...p));

    function parseQuestion(text) {
        text = text.trim().replace(/\?+$/, '');
        for (const {regex, qtype, subj, predGroup, objGroup, lang} of qPatterns) {
            const m = text.match(regex);
            if (!m) continue;
            if (qtype === "get") {
                let rawPred = m[1].trim();
                let pred;
                if (predGroup === "pred") pred = canonicalizePredicate(rawPred);
                else if (["like","has","is","mood","country"].includes(predGroup)) pred = predGroup;
                else pred = canonicalizeVerb(predGroup);
                return { qtype, subj, pred, obj: null, lang };
            } else if (qtype === "check") {
                const obj = m[1].trim();
                const pred = ["is","like","has","mood","country"].includes(predGroup) ? predGroup : canonicalizeVerb(predGroup);
                return { qtype, subj, pred, obj, lang };
            }
        }
        return null;
    }

    // ================== 7. Commandes étendues ==================
    const jokes = {
        fr: [
            "Pourquoi les plongeurs plongent toujours en arrière ? Parce que sinon ils tombent dans le bateau.",
            "Que fait une fraise sur un lit ? Elle attend son petit fils.",
            "Pourquoi est-ce que les oiseaux ne jouent pas aux cartes ? Parce qu'il y a trop de tricheurs dans le ciel.",
            "Quel est le comble pour un électricien ? Ne pas être au courant."
        ],
        en: [
            "Why don't scientists trust atoms? Because they make up everything!",
            "I told my wife she was drawing her eyebrows too high. She looked surprised.",
            "Why did the scarecrow win an award? Because he was outstanding in his field!",
            "Parallel lines have so much in common. It’s a shame they’ll never meet."
        ]
    };
