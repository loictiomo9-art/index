<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href='data:application/manifest+json,{"name":"DeepMemBot","short_name":"Bot","start_url":".","display":"standalone","background_color":"#ffffff","icons":[{"src":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAfSURBVHgB7dAxAQAAAMKg9U9tB2+gAAAAAAAAAAAeAxRAAAHr5xnOAAAAAElFTkSuQmCC","sizes":"192x192","type":"image/png"}]}'>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepMemBot</title>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 1rem; }
    #chatbox { background: white; border-radius: 12px; height: 400px; overflow-y: auto; padding: 1rem; margin-bottom: 0.5rem; }
    .msg { margin: 0.5rem 0; padding: 0.5rem 1rem; border-radius: 1rem; max-width: 80%; clear: both; }
    .user { background: #007aff; color: white; float: right; }
    .bot { background: #e5e5ea; float: left; }
    #input-row { display: flex; gap: 0.5rem; }
    #userInput { flex: 1; padding: 0.7rem; border: 1px solid #ccc; border-radius: 2rem; }
    button { background: #007aff; color: white; border: none; border-radius: 2rem; padding: 0.7rem 1.2rem; font-size: 1rem; cursor: pointer; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <h2>🧠 DeepMemBot</h2>
  <div id="chatbox"></div>
  <div id="input-row">
    <input type="text" id="userInput" placeholder="Écrivez...">
    <button id="sendBtn">Envoyer</button>
  </div>

  <script>
    (function() {
      // --- Mémoire simple (localStorage) ---
      const facts = JSON.parse(localStorage.getItem('facts') || '[]');
      function save() { localStorage.setItem('facts', JSON.stringify(facts)); }
      function addFact(subj, pred, obj) {
        obj = obj.trim().toLowerCase();
        pred = pred.trim().toLowerCase();
        facts.push({ subj, pred, obj, time: Date.now() });
        save();
      }
      function queryFacts(subj, pred) {
        return facts.filter(f => f.subj === subj && f.pred === pred);
      }
      function forgetAll(subj) {
        for (let i = facts.length - 1; i >= 0; i--) {
          if (facts[i].subj === subj) facts.splice(i, 1);
        }
        save();
      }

      // --- Affichage ---
      const chatbox = document.getElementById('chatbox');
      function addMsg(text, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.textContent = text;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      // --- Logique du chatbot ---
      function process(input) {
        input = input.trim();
        if (!input) return;
        addMsg(input, 'user');

        let response = null;
        const lower = input.toLowerCase();

        // Commandes spéciales
        if (lower === 'aide') {
          response = "Dites : je suis..., j'aime..., quelle est ma..., blague, oublie tout sur moi, 2+2, météo Paris";
        }
        else if (lower === 'oublie tout sur moi') {
          forgetAll('user');
          response = "Mémoire effacée.";
        }
        else if (lower === 'blague') {
          response = "Pourquoi les plongeurs plongent-ils toujours en arrière ? Parce que sinon ils tombent dans le bateau.";
        }
        // Extraction : "je suis X"
        else if (/^je suis (.+)/i.test(lower)) {
          const obj = lower.match(/^je suis (.+)/i)[1];
          addFact('user', 'is', obj);
          response = `D'accord, vous êtes ${obj}.`;
        }
        else if (/^j'aime (.+)/i.test(lower)) {
          const obj = lower.match(/^j'aime (.+)/i)[1];
          addFact('user', 'like', obj);
          response = `Je note que vous aimez ${obj}.`;
        }
        else if (/^mon (.+?) est (.+)/i.test(lower)) {
          const m = lower.match(/^mon (.+?) est (.+)/i);
          addFact('user', m[1].replace(/ /g,'_'), m[2]);
          response = `Enregistré.`;
        }
        // Questions : "quelle est ma X ?"
        else if (/^(?:quelle est|quel est) ma (.+?)\??$/i.test(lower)) {
          let pred = lower.match(/^(?:quelle est|quel est) ma (.+?)\??$/i)[1].replace(/ /g,'_').toLowerCase();
          const res = queryFacts('user', pred);
          response = res.length ? res.map(f => f.obj).join(', ') : "Je ne sais pas.";
        }
        else if (/^est-ce que j'aime (.+?)\??$/i.test(lower)) {
          const obj = lower.match(/^est-ce que j'aime (.+?)\??$/i)[1];
          const res = queryFacts('user', 'like').filter(f => f.obj === obj.toLowerCase());
          response = res.length ? "Oui." : "Non.";
        }
        // Calcul simple
        else if (/^[0-9+\-*/().\s]+$/.test(lower)) {
          try { response = eval(lower).toString(); } catch(e) { response = "Erreur."; }
        }
        // Météo
        else if (/^météo (.+)/i.test(lower)) {
          const city = lower.match(/^météo (.+)/i)[1];
          response = "Recherche...";
          fetch(`https://wttr.in/${encodeURIComponent(city)}?format=%C+%t`)
            .then(r => r.text())
            .then(txt => addMsg(`Météo à ${city} : ${txt.trim()}`, 'bot'))
            .catch(() => addMsg("Impossible d'obtenir la météo.", 'bot'));
        }
        else {
          response = "Désolé, je n'ai pas compris. Tapez 'aide'.";
        }

        if (response) addMsg(response, 'bot');
      }

      // --- Événements ---
      document.getElementById('sendBtn').addEventListener('click', function() {
        const input = document.getElementById('userInput');
        process(input.value);
        input.value = '';
      });
      document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('sendBtn').click();
        }
      });

      // Message initial
      addMsg("Bonjour ! Je suis DeepMemBot. Posez-moi des questions, apprenez-moi des choses.", 'bot');
    })();
  </script>
</body>
    </html>
